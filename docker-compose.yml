# Local ghar results UI
#
#   docker compose up --build
#   open http://127.0.0.1:8765/
#
# Mounts ./results (or falls back to ui/sample_results inside the app if empty).

services:
  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    image: ghar-ui:local
    container_name: ghar-ui
    # host network: published ports are flaky in some sandboxes; port is GHAR_UI_PORT
    network_mode: host
    environment:
      GHAR_RESULTS: /data/results
      GHAR_UI_HOST: "0.0.0.0"
      GHAR_UI_PORT: "8765"
    volumes:
      - ./results:/data/results:ro
      - ./ui/sample_results:/data/sample:ro
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/api/health', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 3s
    restart: unless-stopped
