# ghar project oracles + long-work quotas
# Practices: Aider verify loop, Claude Stop hooks, anti-early-stop sessions

timeout_sec=600
on_fail=stop

lint_cmd=
build_cmd=cmake --build build -j$(nproc)
test_cmd=bash tests/run_all.sh

# --- anti-5-minute-quit (used by `ghar work start` defaults) ---
# For deep user tasks, agents MUST: ghar work start --minutes N --goal '...'
min_work_minutes=60
min_verify_ok=2
min_heartbeats=6
heartbeat_max_gap_sec=900
# If true, every `ghar verify` also enforces work quotas when session active
enforce_work_on_verify=false
